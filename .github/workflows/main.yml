name: Python CI Pipeline

on
  push:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@vd

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run:
        pip install -r requirements.txt
        pip install pytest

    - name: Run Unit Tests
      run: pytest
